services:
  mongo:
    image: mongo:7
    container_name: mongo
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        - CMD
        - mongosh
        - --quiet
        - --eval
        - db.adminCommand('ping').ok
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - internal-net

  web-server:
    image: nginx:alpine
    container_name: web-server
    depends_on:
      app-logic:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs/selfsigned.crt:/etc/nginx/certs/selfsigned.crt:ro
      - ./certs/selfsigned.key:/etc/nginx/certs/selfsigned.key:ro
    networks:
      - public-net
      - internal-net

  app-logic:
    build:
      context: ./lenos-backend
      dockerfile: Dockerfile
    container_name: app-logic
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongo:27017/ventalenos
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/comentarios').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - internal-net

networks:
  public-net:
    driver: bridge
  internal-net:
    driver: bridge
    internal: true

volumes:
  mongo-data:
